name: Free targeted CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: targeted-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Self-hosted Windows / validation and affected daily-use lanes
    # Never execute untrusted pull-request code on this persistent machine.
    runs-on: [self-hosted, Windows, X64, agentic-daily-use]
    timeout-minutes: 150
    env:
      E2E_RELEASE_COMMIT_SHA: ${{ github.sha }}
      E2E_TRUST_DISPOSABLE_VAULT: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: companion/requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Install Companion dependencies
        run: python -m pip install --disable-pip-version-check -r companion/requirements.txt

      - name: Unit tests
        run: npm test

      - name: Path hygiene
        run: npm run check:path-hygiene

      - name: Build unified plugin artifact
        run: npm run build

      - name: Companion tests
        run: npm run test:companion

      - name: Unified capability and artifact gates
        run: node scripts/check-extension-release-gates.mjs --component all --skip-tests

      - name: Installed-artifact freshness and data preservation
        run: node scripts/verify-installed-artifacts.mjs

      - name: Install verified Obsidian desktop
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath "$env:LOCALAPPDATA\Obsidian\Obsidian.exe")) {
            ./scripts/install-verified-obsidian.ps1
          }

      - name: Create isolated disposable Obsidian vault
        shell: pwsh
        run: |
          $vault = Join-Path $env:RUNNER_TEMP "agentic-researcher-e2e-$env:E2E_RELEASE_COMMIT_SHA"
          New-Item -ItemType Directory -Force -Path (Join-Path $vault ".obsidian\plugins") | Out-Null
          Set-Content -LiteralPath (Join-Path $vault ".obsidian\community-plugins.json") -Value "[]" -Encoding utf8
          "OBSIDIAN_VAULT=$vault" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OBSIDIAN_CDP_PORT=11223" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run affected daily-use Playwright lanes
        shell: pwsh
        run: >-
          node scripts/run-targeted-protected-release.mjs
          "--sha=$env:E2E_RELEASE_COMMIT_SHA"
          "--lanes=deterministic"

      - name: Upload redacted daily-use summary
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: daily-use-summary-${{ github.sha }}
          path: test-results/protected-targeted/deterministic.json
          retention-days: 3
          if-no-files-found: ignore
