name: Cross-platform CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: ${{ matrix.os }} / ${{ matrix.sandbox_provider }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            sandbox_provider: wsl2
          - os: macos-latest
            sandbox_provider: podman
          - os: ubuntu-latest
            sandbox_provider: bubblewrap
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: companion/requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Install companion dependencies
        run: python -m pip install --disable-pip-version-check -r companion/requirements.txt

      - name: Unit tests
        run: npm test

      - name: TypeScript
        run: npx tsc --noEmit --skipLibCheck

      - name: Path hygiene
        run: npm run check:path-hygiene

      - name: Build the unified plugin artifact
        run: npm run build

      - name: Companion tests
        run: npm run test:companion

      - name: Platform sandbox boundary fixture
        run: node --import tsx scripts/ci-sandbox-boundary.ts
        env:
          AGENTIC_SANDBOX_CI_PROVIDER: ${{ matrix.sandbox_provider }}

      - name: Unified capability and artifact gates
        run: node scripts/check-extension-release-gates.mjs --component all --skip-tests

      - name: Installed artifact freshness and data preservation
        run: node scripts/verify-installed-artifacts.mjs

  windows-obsidian-e2e:
    name: Windows / installed Obsidian deterministic matrix
    needs: validate
    runs-on: windows-2022
    timeout-minutes: 120
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: companion/requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Install companion dependencies
        run: python -m pip install --disable-pip-version-check -r companion/requirements.txt

      - name: Install Obsidian and export its executable path
        shell: pwsh
        run: |
          $version = "1.12.7"
          $expectedSha256 = "f35d2a35061098400a3fafc1bfd38d8bd33f1ad76df8b78b62ccdf20b0a30d26"
          $installer = Join-Path $env:RUNNER_TEMP "Obsidian-$version.exe"
          $installDir = Join-Path $env:RUNNER_TEMP "Obsidian"
          $assetUrl = "https://github.com/obsidianmd/obsidian-releases/releases/download/v$version/Obsidian-$version.exe"

          Invoke-WebRequest -Uri $assetUrl -OutFile $installer
          $actualSha256 = (Get-FileHash -LiteralPath $installer -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualSha256 -ne $expectedSha256) {
            throw "Obsidian installer SHA-256 mismatch. Expected $expectedSha256, received $actualSha256."
          }

          New-Item -ItemType Directory -Force -Path $installDir | Out-Null
          $process = Start-Process -FilePath $installer -ArgumentList @("/S", "/D=$installDir") -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            throw "Obsidian installer exited with code $($process.ExitCode)."
          }

          $obsidianExe = Join-Path $installDir "Obsidian.exe"
          if (-not (Test-Path -LiteralPath $obsidianExe -PathType Leaf)) {
            throw "The verified installer completed, but $obsidianExe was not created."
          }

          $stream = [System.IO.File]::OpenRead($obsidianExe)
          try {
            $reader = [System.IO.BinaryReader]::new($stream)
            $stream.Position = 0x3c
            $peOffset = $reader.ReadInt32()
            $stream.Position = $peOffset + 4
            $machine = $reader.ReadUInt16()
          } finally {
            $reader?.Dispose()
            $stream.Dispose()
          }
          if ($machine -ne 0x8664) {
            throw ("Installed Obsidian executable is not x64 (PE machine 0x{0:x4})." -f $machine)
          }

          $signature = Get-AuthenticodeSignature -LiteralPath $obsidianExe
          if ($signature.Status -ne "Valid") {
            throw "Installed Obsidian Authenticode signature is $($signature.Status), expected Valid."
          }
          "OBSIDIAN_EXE=$obsidianExe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create isolated Obsidian vault
        shell: pwsh
        run: |
          $vault = Join-Path $env:RUNNER_TEMP "agentic-researcher-e2e-vault"
          New-Item -ItemType Directory -Force -Path (Join-Path $vault ".obsidian\plugins") | Out-Null
          Set-Content -LiteralPath (Join-Path $vault ".obsidian\community-plugins.json") -Value "[]" -Encoding utf8
          "OBSIDIAN_VAULT=$vault" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OBSIDIAN_CDP_PORT=11223" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Deterministic Obsidian Playwright matrix
        env:
          # This job creates the vault above from trusted checked-out artifacts.
          # Keep the first-open trust opt-in scoped to that disposable vault run.
          E2E_TRUST_DISPOSABLE_VAULT: "1"
        run: npm run test:e2e:deterministic-matrix

      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-obsidian-playwright-diagnostics
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
