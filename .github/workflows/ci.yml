name: Free targeted CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: targeted-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Ubuntu / unit, build, and Companion
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: companion/requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Install Companion dependencies
        run: python -m pip install --disable-pip-version-check -r companion/requirements.txt

      - name: Unit tests
        run: npm test

      - name: Path hygiene
        run: npm run check:path-hygiene

      - name: Build unified plugin artifact
        run: npm run build

      - name: Companion tests
        run: npm run test:companion

      - name: Unified capability and artifact gates
        run: node scripts/check-extension-release-gates.mjs --component all --skip-tests

      - name: Installed-artifact freshness and data preservation
        run: node scripts/verify-installed-artifacts.mjs

  windows-daily-use:
    name: Windows / affected daily-use lanes
    needs: validate
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: windows-2022
    timeout-minutes: 120
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: companion/requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Install Companion dependencies
        run: python -m pip install --disable-pip-version-check -r companion/requirements.txt

      - name: Install verified Obsidian desktop
        shell: pwsh
        run: ./scripts/install-verified-obsidian.ps1

      - name: Create isolated disposable Obsidian vault
        shell: pwsh
        run: |
          $vault = Join-Path $env:RUNNER_TEMP "agentic-researcher-e2e-vault"
          New-Item -ItemType Directory -Force -Path (Join-Path $vault ".obsidian\plugins") | Out-Null
          Set-Content -LiteralPath (Join-Path $vault ".obsidian\community-plugins.json") -Value "[]" -Encoding utf8
          "OBSIDIAN_VAULT=$vault" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OBSIDIAN_CDP_PORT=11223" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run affected daily-use Playwright lanes
        env:
          E2E_TRUST_DISPOSABLE_VAULT: "1"
        run: npm run test:e2e:daily-use

      - name: Upload redacted daily-use summary
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: daily-use-summary-${{ github.sha }}
          path: test-results/daily-use-run-summary.json
          retention-days: 3
          if-no-files-found: ignore
