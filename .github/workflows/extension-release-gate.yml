name: Independent extension release gate

on:
  workflow_dispatch:
    inputs:
      component:
        description: Component whose compatibility and capability gates must pass
        required: true
        type: choice
        options:
          - core
          - code
          - integrations
          - companion

permissions:
  contents: read

concurrency:
  group: extension-release-${{ inputs.component }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gate:
    name: Gate ${{ inputs.component }} independently
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python for companion gate
        if: inputs.component == 'companion'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: companion/requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Install companion dependencies
        if: inputs.component == 'companion'
        run: python -m pip install --disable-pip-version-check -r companion/requirements.txt

      - name: Build versioned plugin artifacts
        run: npm run build

      - name: Selected compatibility and capability tests
        run: node scripts/check-extension-release-gates.mjs --component ${{ inputs.component }}

      - name: Companion service tests
        if: inputs.component == 'companion'
        run: npm run test:companion

      - name: Installed artifact freshness and data preservation
        run: node scripts/verify-installed-artifacts.mjs
