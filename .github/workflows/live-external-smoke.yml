name: Disposable live external provider smoke

on:
  workflow_dispatch:
    inputs:
      provider:
        description: Disposable provider mutation scope; merge performs a second compensating cleanup merge
        required: true
        type: choice
        options:
          - linear
          - github_draft
          - github_merge
      disposable_confirmation:
        description: Type DISPOSABLE_ONLY
        required: true
        type: string
      merge_confirmation:
        description: For github_merge only, type MERGE_DISPOSABLE_PR
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: disposable-live-external-${{ inputs.provider }}
  cancel-in-progress: false

jobs:
  smoke:
    name: ${{ inputs.provider }} / mutate, verify, and clean up
    runs-on: [self-hosted, Windows, X64, agentic-daily-use]
    timeout-minutes: 45
    environment: disposable-live-external
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install verified Obsidian desktop
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath "$env:LOCALAPPDATA\Obsidian\Obsidian.exe")) {
            ./scripts/install-verified-obsidian.ps1
          }

      - name: Create isolated disposable Obsidian vault
        shell: pwsh
        run: |
          $vault = Join-Path $env:RUNNER_TEMP "agentic-researcher-live-external-vault"
          New-Item -ItemType Directory -Force -Path (Join-Path $vault ".obsidian\plugins") | Out-Null
          Set-Content -LiteralPath (Join-Path $vault ".obsidian\community-plugins.json") -Value "[]" -Encoding utf8
          "OBSIDIAN_VAULT=$vault" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OBSIDIAN_CDP_PORT=11223" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Fail-closed disposable-target preflight
        shell: pwsh
        run: node scripts/live-external-preflight.mjs --provider "$env:E2E_SELECTED_PROVIDER"
        env:
          E2E_SELECTED_PROVIDER: ${{ inputs.provider }}
          LIVE_EXTERNAL_DISPOSABLE_CONFIRMATION: ${{ inputs.disposable_confirmation }}
          LIVE_EXTERNAL_MERGE_CONFIRMATION: ${{ inputs.merge_confirmation }}
          LIVE_EXTERNAL_TARGET_LABEL: ${{ vars.LIVE_EXTERNAL_TARGET_LABEL }}
          AGENTIC_LIVE_EXTERNAL_CLEANUP_REQUIRED: "true"
          LINEAR_LIVE_TEST_TOKEN: ${{ secrets.LINEAR_LIVE_TEST_TOKEN }}
          LINEAR_LIVE_TEST_TEAM_ID: ${{ vars.LINEAR_LIVE_TEST_TEAM_ID }}
          LINEAR_LIVE_TEST_PROJECT_ID: ${{ vars.LINEAR_LIVE_TEST_PROJECT_ID }}
          GITHUB_LIVE_TEST_TOKEN: ${{ secrets.DISPOSABLE_GITHUB_TOKEN }}
          E2E_LIVE_GITHUB_REPOSITORY: ${{ vars.DISPOSABLE_GITHUB_REPOSITORY }}
          E2E_LIVE_LINEAR_PROJECT: ${{ vars.DISPOSABLE_LINEAR_PROJECT_LABEL }}
          E2E_LIVE_ALLOW_MERGE: ${{ inputs.provider == 'github_merge' && '1' || '0' }}

      - name: Mutate, independently verify, deduplicate, and clean up the disposable provider
        run: node scripts/run-e2e-exclusive.mjs --live-external --project=disposable-live-external --grep "disposable live external smoke"
        env:
          E2E_LIVE_PROVIDER: ${{ inputs.provider }}
          LIVE_EXTERNAL_DISPOSABLE_CONFIRMATION: ${{ inputs.disposable_confirmation }}
          E2E_LIVE_GITHUB_REPOSITORY: ${{ vars.DISPOSABLE_GITHUB_REPOSITORY }}
          E2E_LIVE_LINEAR_PROJECT: ${{ vars.DISPOSABLE_LINEAR_PROJECT_LABEL }}
          LINEAR_LIVE_TEST_TOKEN: ${{ secrets.LINEAR_LIVE_TEST_TOKEN }}
          LINEAR_LIVE_TEST_TEAM_ID: ${{ vars.LINEAR_LIVE_TEST_TEAM_ID }}
          LINEAR_LIVE_TEST_PROJECT_ID: ${{ vars.LINEAR_LIVE_TEST_PROJECT_ID }}
          GITHUB_LIVE_TEST_TOKEN: ${{ secrets.DISPOSABLE_GITHUB_TOKEN }}
          E2E_LIVE_ALLOW_MERGE: ${{ inputs.provider == 'github_merge' && '1' || '0' }}
          LIVE_EXTERNAL_MERGE_CONFIRMATION: ${{ inputs.merge_confirmation }}
          AGENTIC_LIVE_EXTERNAL_CLEANUP_REQUIRED: "true"
          E2E_TRUST_DISPOSABLE_VAULT: "1"
