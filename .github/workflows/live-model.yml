name: Free self-hosted targeted live model contract

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: targeted-live-model-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live-research:
    runs-on: [self-hosted, Windows, X64, agentic-daily-use]
    timeout-minutes: 45
    environment: protected-live-release
    env:
      E2E_RELEASE_COMMIT_SHA: ${{ github.sha }}
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci

      - name: Install semantic embedding runtime
        run: python -m pip install --disable-pip-version-check fastembed==0.8.0

      - name: Install verified Obsidian desktop
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath "$env:LOCALAPPDATA\Obsidian\Obsidian.exe")) {
            ./scripts/install-verified-obsidian.ps1
          }

      - name: Create isolated disposable Obsidian vault
        shell: pwsh
        run: |
          $vault = Join-Path $env:RUNNER_TEMP "agentic-researcher-live-$env:E2E_RELEASE_COMMIT_SHA"
          New-Item -ItemType Directory -Force -Path (Join-Path $vault ".obsidian\plugins") | Out-Null
          Set-Content -LiteralPath (Join-Path $vault ".obsidian\community-plugins.json") -Value "[]" -Encoding utf8
          "OBSIDIAN_VAULT=$vault" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OBSIDIAN_CDP_PORT=11223" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run affected DU-02 live-model scenarios
        shell: pwsh
        run: >-
          node scripts/run-targeted-protected-release.mjs
          "--sha=$env:E2E_RELEASE_COMMIT_SHA"
          "--lanes=research"
        env:
          E2E_OLLAMA_API_KEY: ${{ secrets.E2E_OLLAMA_API_KEY }}
          E2E_AI_MODEL: ${{ vars.E2E_AI_MODEL || 'gpt-oss:120b-cloud' }}
          E2E_OLLAMA_BASE_URL: ${{ vars.E2E_OLLAMA_BASE_URL || 'https://ollama.com/api' }}
          E2E_TRUST_DISPOSABLE_VAULT: "1"

      - name: Upload redacted live summary
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: live-model-summary-${{ github.sha }}
          path: test-results/protected-targeted/research.json
          retention-days: 3
          if-no-files-found: ignore
