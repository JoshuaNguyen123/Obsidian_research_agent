name: Free self-hosted sandbox contract check

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hosted-sandbox-contract-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    name: Windows / secret-free WSL2 sandbox contract
    runs-on: [self-hosted, Windows, X64, agentic-daily-use]
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify the fixed sandbox command contract
        run: node --import tsx scripts/ci-sandbox-boundary.ts
        env:
          AGENTIC_SANDBOX_CI_PROVIDER: wsl2

      - name: Explain the protected WSL2 proof boundary
        shell: pwsh
        run: >-
          Write-Output "This secret-free job validates the fixed WSL2 command contract only.
          The protected targeted workflow separately performs the live exact-SHA boundary probe."
