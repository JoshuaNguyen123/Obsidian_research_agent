name: Live self-hosted sandbox boundary

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: live-sandbox-boundary-${{ github.ref }}
  cancel-in-progress: false

jobs:
  probe:
    name: ${{ matrix.name }} / real boundary probe
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows WSL2
            runner: '["self-hosted","Windows","X64","agentic-sandbox-wsl2"]'
            provider: wsl2
            executable: wsl.exe
            runtime_reference: AGENTIC_SANDBOX_CI_WSL2_RUNTIME_REFERENCE
            runtime_digest: AGENTIC_SANDBOX_CI_WSL2_RUNTIME_DIGEST
            wsl_distribution: AGENTIC_SANDBOX_CI_WSL2_DISTRIBUTION
            runtime_root: AGENTIC_SANDBOX_CI_WSL2_RUNTIME_ROOT
          - name: macOS Podman
            runner: '["self-hosted","macOS","X64","agentic-sandbox-podman"]'
            provider: podman
            executable: podman
            runtime_reference: AGENTIC_SANDBOX_CI_PODMAN_RUNTIME_REFERENCE
            runtime_digest: AGENTIC_SANDBOX_CI_PODMAN_RUNTIME_DIGEST
            wsl_distribution: AGENTIC_SANDBOX_CI_UNUSED
            runtime_root: AGENTIC_SANDBOX_CI_UNUSED
          - name: Linux bubblewrap
            runner: '["self-hosted","Linux","X64","agentic-sandbox-bubblewrap"]'
            provider: bubblewrap
            executable: bwrap
            runtime_reference: AGENTIC_SANDBOX_CI_BUBBLEWRAP_RUNTIME_REFERENCE
            runtime_digest: AGENTIC_SANDBOX_CI_BUBBLEWRAP_RUNTIME_DIGEST
            wsl_distribution: AGENTIC_SANDBOX_CI_UNUSED
            runtime_root: AGENTIC_SANDBOX_CI_BUBBLEWRAP_RUNTIME_ROOT
    runs-on: ${{ fromJSON(matrix.runner) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Execute real fixed sandbox boundary probe
        run: node --import tsx scripts/ci-sandbox-boundary.ts
        env:
          AGENTIC_SANDBOX_CI_LIVE: "1"
          AGENTIC_SANDBOX_CI_PROVIDER: ${{ matrix.provider }}
          AGENTIC_SANDBOX_CI_EXECUTABLE: ${{ matrix.executable }}
          AGENTIC_SANDBOX_CI_RUNTIME_REFERENCE: ${{ vars[matrix.runtime_reference] }}
          AGENTIC_SANDBOX_CI_RUNTIME_DIGEST: ${{ vars[matrix.runtime_digest] }}
          AGENTIC_SANDBOX_CI_WSL_DISTRIBUTION: ${{ vars[matrix.wsl_distribution] }}
          AGENTIC_SANDBOX_CI_RUNTIME_ROOT: ${{ vars[matrix.runtime_root] }}
