name: Hosted sandbox contract check

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hosted-sandbox-contract-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    name: Ubuntu / secret-free sandbox contract
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify the fixed sandbox command contract
        run: node --import tsx scripts/ci-sandbox-boundary.ts
        env:
          AGENTIC_SANDBOX_CI_PROVIDER: bubblewrap

      - name: Explain the protected WSL2 proof boundary
        run: >-
          echo "GitHub-hosted Windows runners do not attest this product's dedicated WSL2 runtime.
          Run the exact-SHA WSL2 DU-03/DU-06 proof locally on the protected Windows machine."
