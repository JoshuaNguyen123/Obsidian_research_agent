name: Publish public site

on:
  # Manual-only so a normal source push never queues the owner's personal
  # self-hosted runner. Deploy after reviewing the static artifact.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: [self-hosted, Windows, X64, agentic-daily-use]
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Verify exact trusted main tip
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          git fetch --no-tags origin "+refs/heads/main:refs/remotes/origin/main"
          $actual = (git rev-parse HEAD).Trim().ToLowerInvariant()
          $trusted = (git rev-parse refs/remotes/origin/main).Trim().ToLowerInvariant()
          if ($actual -ne $trusted -or $actual -ne "${{ github.sha }}") {
            throw "Pages publication accepts only the exact trusted origin/main tip."
          }
      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - name: Archive static site
        shell: pwsh
        run: |
          tar.exe --exclude=.git --exclude=.github -C public-site -cf "$env:RUNNER_TEMP\artifact.tar" .
      - name: Upload static site
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
