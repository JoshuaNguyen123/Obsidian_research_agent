name: Protected targeted release checks

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Exact full commit SHA to attest
        required: true
        type: string
      lanes:
        description: Comma-separated targeted lanes (deterministic,research,code,compound)
        required: true
        default: deterministic,research,code,compound
        type: string

permissions:
  contents: read

concurrency:
  group: protected-targeted-release-${{ inputs.commit_sha }}
  cancel-in-progress: false

jobs:
  self-hosted-proof:
    name: Exact SHA / free self-hosted targeted proof
    environment: protected-live-release
    # This dedicated label prevents accidental use of paid GitHub-hosted minutes.
    # Register the local Windows runner with: self-hosted, Windows, X64,
    # agentic-daily-use. Run it as an unprivileged account with WSL2 and
    # Obsidian installed; the workflow never installs a privileged service.
    runs-on: [self-hosted, Windows, X64, agentic-daily-use]
    timeout-minutes: 240
    env:
      PROTECTED_TARGETED_LANES: ${{ inputs.lanes }}
      E2E_PROTECTED_LOG_MODE: "1"
    steps:
      - name: Check out exact SHA without persisted credentials
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.commit_sha }}
          fetch-depth: 1
          persist-credentials: false
          clean: true

      - name: Verify accessible local prerequisites
        id: verify-sha
        shell: pwsh
        env:
          REQUESTED_COMMIT_SHA: ${{ inputs.commit_sha }}
        run: |
          $ErrorActionPreference = "Stop"
          if ($env:REQUESTED_COMMIT_SHA -notmatch '^[a-f0-9]{40}$') {
            throw "commit_sha must be one full lowercase Git commit SHA."
          }
          $actualSha = (git rev-parse HEAD).Trim().ToLowerInvariant()
          if ($actualSha -ne $env:REQUESTED_COMMIT_SHA) {
            throw "Checked out $actualSha instead of requested SHA $env:REQUESTED_COMMIT_SHA."
          }
          git fetch --no-tags origin "+refs/heads/main:refs/remotes/origin/main"
          git merge-base --is-ancestor $env:REQUESTED_COMMIT_SHA refs/remotes/origin/main
          if ($LASTEXITCODE -ne 0) {
            throw "Protected proof accepts only a commit already reachable from trusted origin/main."
          }
          "sha=$actualSha" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "E2E_RELEASE_COMMIT_SHA=$actualSha" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          foreach ($command in @("git", "node", "npm", "python", "wsl.exe")) {
            if (-not (Get-Command $command -ErrorAction SilentlyContinue)) {
              throw "Missing local runner prerequisite: $command"
            }
          }
          node --version
          npm --version
          python --version
          if (-not (Test-Path -LiteralPath "$env:LOCALAPPDATA\Obsidian\Obsidian.exe")) {
            ./scripts/install-verified-obsidian.ps1
          }

      - name: Install exact repository dependencies
        run: npm ci

      - name: Create isolated disposable Obsidian vault
        shell: pwsh
        run: |
          if ($env:E2E_RELEASE_COMMIT_SHA -notmatch '^[a-f0-9]{40}$') {
            throw "commit_sha must be one full lowercase Git commit SHA."
          }
          $vault = Join-Path $env:RUNNER_TEMP "agentic-researcher-protected-$env:E2E_RELEASE_COMMIT_SHA"
          New-Item -ItemType Directory -Force -Path (Join-Path $vault ".obsidian\plugins") | Out-Null
          Set-Content -LiteralPath (Join-Path $vault ".obsidian\community-plugins.json") -Value "[]" -Encoding utf8
          "OBSIDIAN_VAULT=$vault" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OBSIDIAN_CDP_PORT=11223" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Probe the real WSL2 sandbox boundary
        run: npx tsx scripts/ci-sandbox-boundary.ts
        env:
          AGENTIC_SANDBOX_CI_LIVE: "1"
          AGENTIC_SANDBOX_CI_EXECUTABLE: ${{ vars.AGENTIC_SANDBOX_CI_EXECUTABLE || 'wsl.exe' }}
          AGENTIC_SANDBOX_CI_RUNTIME_REFERENCE: ${{ vars.AGENTIC_SANDBOX_CI_RUNTIME_REFERENCE }}
          AGENTIC_SANDBOX_CI_RUNTIME_DIGEST: ${{ vars.AGENTIC_SANDBOX_CI_RUNTIME_DIGEST }}
          AGENTIC_SANDBOX_CI_WSL_DISTRIBUTION: ${{ vars.AGENTIC_SANDBOX_CI_WSL_DISTRIBUTION }}
          AGENTIC_SANDBOX_CI_RUNTIME_ROOT: ${{ vars.AGENTIC_SANDBOX_CI_RUNTIME_ROOT }}

      - name: Run only exact affected daily-use files and selected research cases
        shell: pwsh
        run: >-
          node scripts/run-targeted-protected-release.mjs
          "--sha=$env:E2E_RELEASE_COMMIT_SHA"
          "--lanes=$env:PROTECTED_TARGETED_LANES"
        env:
          E2E_TRUST_DISPOSABLE_VAULT: "1"
          E2E_MODEL_PROVIDER: ollama
          E2E_OLLAMA_API_KEY: ${{ secrets.E2E_OLLAMA_API_KEY }}
          E2E_AI_MODEL: ${{ vars.E2E_AI_MODEL || 'gpt-oss:120b-cloud' }}
          E2E_OLLAMA_BASE_URL: ${{ vars.E2E_OLLAMA_BASE_URL || 'https://ollama.com/api' }}
          E2E_LINEAR_API_KEY: ${{ secrets.LINEAR_LIVE_TEST_TOKEN }}
          LINEAR_LIVE_TEST_TEAM_ID: ${{ vars.LINEAR_LIVE_TEST_TEAM_ID }}
          E2E_RELEASE_LINEAR_PROJECT_ID: ${{ vars.LINEAR_LIVE_TEST_PROJECT_ID }}
          E2E_GITHUB_TOKEN: ${{ secrets.GITHUB_LIVE_TEST_TOKEN }}
          E2E_RELEASE_GITHUB_REPOSITORY_PREFIX: ${{ vars.E2E_RELEASE_GITHUB_REPOSITORY_PREFIX || 'agentic-e2e-disposable' }}
          AGENTIC_SANDBOX_CI_LIVE: "1"
          AGENTIC_SANDBOX_CI_EXECUTABLE: ${{ vars.AGENTIC_SANDBOX_CI_EXECUTABLE || 'wsl.exe' }}
          AGENTIC_SANDBOX_CI_RUNTIME_REFERENCE: ${{ vars.AGENTIC_SANDBOX_CI_RUNTIME_REFERENCE }}
          AGENTIC_SANDBOX_CI_RUNTIME_DIGEST: ${{ vars.AGENTIC_SANDBOX_CI_RUNTIME_DIGEST }}
          AGENTIC_SANDBOX_CI_WSL_DISTRIBUTION: ${{ vars.AGENTIC_SANDBOX_CI_WSL_DISTRIBUTION }}
          AGENTIC_SANDBOX_CI_RUNTIME_ROOT: ${{ vars.AGENTIC_SANDBOX_CI_RUNTIME_ROOT }}

      - name: Upload redacted targeted proof summaries
        if: always() && steps.verify-sha.outcome == 'success'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: protected-targeted-summaries-${{ steps.verify-sha.outputs.sha }}
          path: |
            .agentic-proof/${{ steps.verify-sha.outputs.sha }}/deterministic.json
            .agentic-proof/${{ steps.verify-sha.outputs.sha }}/deterministic-summary-unavailable.json
            .agentic-proof/${{ steps.verify-sha.outputs.sha }}/deterministic--daily-use-du03-checkers-fast-validation-diagnostic.json
            .agentic-proof/${{ steps.verify-sha.outputs.sha }}/deterministic--daily-use-du06-fast-validation-diagnostic.json
            .agentic-proof/${{ steps.verify-sha.outputs.sha }}/deterministic--daily-use-du06-stage-entry-proof.json
            .agentic-proof/${{ steps.verify-sha.outputs.sha }}/deterministic--daily-use-du06-cleanup-proof.json
            .agentic-proof/${{ steps.verify-sha.outputs.sha }}/deterministic--daily-use-du06-retained-linear-evidence.json
            .agentic-proof/${{ steps.verify-sha.outputs.sha }}/research.json
            .agentic-proof/${{ steps.verify-sha.outputs.sha }}/research-summary-unavailable.json
            .agentic-proof/${{ steps.verify-sha.outputs.sha }}/research--daily-use-du03-checkers-fast-validation-diagnostic.json
            .agentic-proof/${{ steps.verify-sha.outputs.sha }}/research--daily-use-du06-fast-validation-diagnostic.json
            .agentic-proof/${{ steps.verify-sha.outputs.sha }}/research--daily-use-du06-stage-entry-proof.json
            .agentic-proof/${{ steps.verify-sha.outputs.sha }}/research--daily-use-du06-cleanup-proof.json
            .agentic-proof/${{ steps.verify-sha.outputs.sha }}/research--daily-use-du06-retained-linear-evidence.json
            .agentic-proof/${{ steps.verify-sha.outputs.sha }}/code.json
            .agentic-proof/${{ steps.verify-sha.outputs.sha }}/code-summary-unavailable.json
            .agentic-proof/${{ steps.verify-sha.outputs.sha }}/code--daily-use-du03-checkers-fast-validation-diagnostic.json
            .agentic-proof/${{ steps.verify-sha.outputs.sha }}/code--daily-use-du06-fast-validation-diagnostic.json
            .agentic-proof/${{ steps.verify-sha.outputs.sha }}/code--daily-use-du06-stage-entry-proof.json
            .agentic-proof/${{ steps.verify-sha.outputs.sha }}/code--daily-use-du06-cleanup-proof.json
            .agentic-proof/${{ steps.verify-sha.outputs.sha }}/code--daily-use-du06-retained-linear-evidence.json
            .agentic-proof/${{ steps.verify-sha.outputs.sha }}/compound.json
            .agentic-proof/${{ steps.verify-sha.outputs.sha }}/compound-summary-unavailable.json
            .agentic-proof/${{ steps.verify-sha.outputs.sha }}/compound--daily-use-du03-checkers-fast-validation-diagnostic.json
            .agentic-proof/${{ steps.verify-sha.outputs.sha }}/compound--daily-use-du06-fast-validation-diagnostic.json
            .agentic-proof/${{ steps.verify-sha.outputs.sha }}/compound--daily-use-du06-stage-entry-proof.json
            .agentic-proof/${{ steps.verify-sha.outputs.sha }}/compound--daily-use-du06-cleanup-proof.json
            .agentic-proof/${{ steps.verify-sha.outputs.sha }}/compound--daily-use-du06-retained-linear-evidence.json
          retention-days: 3
          if-no-files-found: ignore

      - name: Summarize the free runner boundary
        if: always()
        shell: pwsh
        run: |
          @"
          ### Targeted protected proof

          This job ran on the repository owner's self-hosted Windows runner, so it did not consume GitHub-hosted runner minutes. The lane selector is allowlisted by the repository script and cannot expand into the full Playwright suite, deterministic matrix, or real-model soak.
          "@ | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY
