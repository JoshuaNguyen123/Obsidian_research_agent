name: Protected hosted release checks

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Exact commit SHA to attest
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: protected-hosted-release-${{ inputs.commit_sha }}
  cancel-in-progress: false

jobs:
  hosted-proof:
    name: Exact SHA / hosted daily-use and provider checks
    environment: protected-live-release
    runs-on: windows-2022
    timeout-minutes: 180
    steps:
      - name: Check out exact SHA
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.commit_sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Verify exact SHA
        shell: pwsh
        env:
          E2E_RELEASE_COMMIT_SHA: ${{ inputs.commit_sha }}
        run: |
          if ($env:E2E_RELEASE_COMMIT_SHA -notmatch '^[0-9a-f]{40}$') {
            throw "commit_sha must be one full lowercase Git SHA."
          }
          $actual = git rev-parse HEAD
          if ($actual -ne $env:E2E_RELEASE_COMMIT_SHA) {
            throw "Checked out $actual instead of requested SHA."
          }

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci

      - name: Install semantic embedding runtime
        run: python -m pip install --disable-pip-version-check fastembed==0.8.0

      - name: Install verified Obsidian desktop
        shell: pwsh
        run: ./scripts/install-verified-obsidian.ps1

      - name: Create isolated disposable Obsidian vault
        shell: pwsh
        run: |
          $vault = Join-Path $env:RUNNER_TEMP "agentic-researcher-disposable-release-vault"
          New-Item -ItemType Directory -Force -Path (Join-Path $vault ".obsidian\plugins") | Out-Null
          Set-Content -LiteralPath (Join-Path $vault ".obsidian\community-plugins.json") -Value "[]" -Encoding utf8
          "OBSIDIAN_VAULT=$vault" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OBSIDIAN_CDP_PORT=11223" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          New-Item -ItemType Directory -Force -Path "test-results\protected-hosted" | Out-Null

      - name: Build exact release artifacts
        run: npm run build

      - name: Run affected deterministic daily-use lanes
        run: npm run test:e2e:daily-use
        env:
          E2E_TRUST_DISPOSABLE_VAULT: "1"

      - name: Preserve deterministic redacted summary
        if: always()
        shell: pwsh
        run: |
          if (Test-Path -LiteralPath "test-results\daily-use-run-summary.json") {
            Copy-Item -LiteralPath "test-results\daily-use-run-summary.json" -Destination "test-results\protected-hosted\deterministic.json" -Force
          }

      - name: Run affected DU-02 live-model scenarios
        run: npm run test:e2e:daily-use:live-model
        env:
          E2E_OLLAMA_API_KEY: ${{ secrets.E2E_OLLAMA_API_KEY }}
          E2E_AI_MODEL: ${{ vars.E2E_AI_MODEL || 'gpt-oss:120b-cloud' }}
          E2E_OLLAMA_BASE_URL: ${{ vars.E2E_OLLAMA_BASE_URL || 'https://ollama.com/api' }}
          E2E_TRUST_DISPOSABLE_VAULT: "1"

      - name: Preserve live-model redacted summary
        if: always()
        shell: pwsh
        run: |
          if (Test-Path -LiteralPath "test-results\daily-use-run-summary.json") {
            Copy-Item -LiteralPath "test-results\daily-use-run-summary.json" -Destination "test-results\protected-hosted\live-model.json" -Force
          }

      - name: Mutate, verify, deduplicate, and clean up disposable Linear
        shell: pwsh
        env:
          E2E_LIVE_PROVIDER: linear
          LIVE_EXTERNAL_DISPOSABLE_CONFIRMATION: DISPOSABLE_ONLY
          LIVE_EXTERNAL_TARGET_LABEL: ${{ vars.LIVE_EXTERNAL_TARGET_LABEL }}
          AGENTIC_LIVE_EXTERNAL_CLEANUP_REQUIRED: "true"
          E2E_LIVE_LINEAR_PROJECT: ${{ vars.DISPOSABLE_LINEAR_PROJECT_LABEL }}
          LINEAR_LIVE_TEST_TOKEN: ${{ secrets.LINEAR_LIVE_TEST_TOKEN }}
          LINEAR_LIVE_TEST_TEAM_ID: ${{ vars.LINEAR_LIVE_TEST_TEAM_ID }}
          LINEAR_LIVE_TEST_PROJECT_ID: ${{ vars.LINEAR_LIVE_TEST_PROJECT_ID }}
          E2E_LIVE_ALLOW_MERGE: "0"
        run: |
          node scripts/live-external-preflight.mjs --provider linear
          npm run test:e2e:live

      - name: Preserve Linear redacted summary
        if: always()
        shell: pwsh
        run: |
          if (Test-Path -LiteralPath "test-results\daily-use-run-summary.json") {
            Copy-Item -LiteralPath "test-results\daily-use-run-summary.json" -Destination "test-results\protected-hosted\linear.json" -Force
          }

      - name: Publish, verify, and clean up disposable GitHub draft
        shell: pwsh
        env:
          E2E_LIVE_PROVIDER: github_draft
          LIVE_EXTERNAL_DISPOSABLE_CONFIRMATION: DISPOSABLE_ONLY
          LIVE_EXTERNAL_TARGET_LABEL: ${{ vars.LIVE_EXTERNAL_TARGET_LABEL }}
          AGENTIC_LIVE_EXTERNAL_CLEANUP_REQUIRED: "true"
          E2E_LIVE_GITHUB_REPOSITORY: ${{ vars.DISPOSABLE_GITHUB_REPOSITORY }}
          GITHUB_LIVE_TEST_TOKEN: ${{ secrets.GITHUB_LIVE_TEST_TOKEN }}
          E2E_LIVE_ALLOW_MERGE: "0"
        run: |
          node scripts/live-external-preflight.mjs --provider github_draft
          npm run test:e2e:live

      - name: Preserve GitHub redacted summary
        if: always()
        shell: pwsh
        run: |
          if (Test-Path -LiteralPath "test-results\daily-use-run-summary.json") {
            Copy-Item -LiteralPath "test-results\daily-use-run-summary.json" -Destination "test-results\protected-hosted\github.json" -Force
          }

      - name: Record the local WSL2 completion boundary
        if: always()
        shell: pwsh
        run: |
          @"
          ### Protected boundary still requiring local proof

          The standard GitHub-hosted Windows image cannot attest the dedicated WSL2 runtime used by DU-03 and DU-06. Run those two exact-SHA lanes locally on the protected Windows machine. This hosted job is intentionally not labeled as full release proof.
          "@ | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY

      - name: Upload redacted hosted proof summaries
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: protected-hosted-summaries-${{ inputs.commit_sha }}
          path: test-results/protected-hosted/*.json
          retention-days: 3
          if-no-files-found: ignore
