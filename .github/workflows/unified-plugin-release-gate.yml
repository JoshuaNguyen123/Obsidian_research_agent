name: Unified plugin release gate

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: unified-plugin-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gate:
    name: Gate the unified Agentic Researcher plugin
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python for the built-in Companion capability
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: companion/requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Install Companion service dependencies
        run: python -m pip install --disable-pip-version-check -r companion/requirements.txt

      - name: Build the unified plugin artifact
        run: npm run build

      - name: Unified compatibility and capability tests
        run: node scripts/check-extension-release-gates.mjs --component core

      - name: Companion service tests
        run: npm run test:companion

      - name: Installed artifact freshness and legacy-data preservation
        run: node scripts/verify-installed-artifacts.mjs
